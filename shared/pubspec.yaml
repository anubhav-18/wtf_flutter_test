name: wtf_shared
description: Shared local-first logic and UI for the WTF Flutter assessment.
publish_to: 'none'
version: 0.1.0

environment:
  sdk: ^3.10.1

dependencies:
  flutter:
    sdk: flutter
  collection: ^1.19.1
  flutter_riverpod: ^3.2.1
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  hmssdk_flutter: ^1.11.1
  http: ^1.6.0
  image_picker: ^1.1.2
  file_picker: ^10.1.9
  intl: ^0.20.2
  path_provider: ^2.1.5
  permission_handler: ^11.4.0
  uuid: ^4.5.3

dev_dependencies:
  flutter_lints: ^6.0.0
  flutter_test:
    sdk: flutter

flutter:
  uses-material-design: true
